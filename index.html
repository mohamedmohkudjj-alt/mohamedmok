<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MyTube Pro | Mobile Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #0f0f0f; color: white; font-family: system-ui, -apple-system, sans-serif; }
        
        /* مصلح مشغل الفيديو للهواتف - الحل الذهبي */
        .video-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* نسبة 16:9 */
            height: 0;
            overflow: hidden;
            border-radius: 20px;
            background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .video-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .glass-nav { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid #272727; }
        .comment-box { background: #1a1a1a; border-radius: 15px; border: 1px solid #333; padding: 12px; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <header class="glass-nav sticky top-0 z-50 p-4 flex justify-between items-center">
        <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
            <i class="fab fa-youtube text-red-600 text-3xl"></i>
            <span class="font-black text-xl tracking-tighter italic">MY<span class="text-red-600">TUBE</span></span>
        </div>
        <button onclick="openModal()" class="bg-red-600 w-10 h-10 rounded-full flex items-center justify-center shadow-lg shadow-red-900/40">
            <i class="fas fa-plus text-sm"></i>
        </button>
    </header>

    <main class="max-w-2xl mx-auto p-4 space-y-12 pb-24">
        <div id="video-feed" class="space-y-12">
            </div>
    </main>

    <div id="add-modal" class="fixed inset-0 bg-black/95 hidden z-[100] items-center justify-center p-6">
        <div class="bg-[#1a1a1a] w-full max-w-sm p-8 rounded-[2.5rem] border border-gray-800 shadow-2xl">
            <h2 class="text-xl font-bold mb-6 text-center">نشر محتوى جديد</h2>
            <input id="v-title" type="text" placeholder="عنوان الفيديو..." class="w-full bg-black border border-gray-800 p-4 rounded-2xl mb-4 outline-none focus:border-red-600 transition text-sm">
            <input id="v-url" type="text" placeholder="رابط يوتيوب (نسخ)" class="w-full bg-black border border-gray-800 p-4 rounded-2xl mb-6 outline-none focus:border-red-600 transition text-sm">
            <div class="flex gap-3">
                <button onclick="addVideo()" class="flex-1 bg-red-600 py-4 rounded-2xl font-bold">نشر الآن</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-800 py-4 rounded-2xl font-bold text-gray-400">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('gh_mobile_vids')) || [];

        function openModal() { document.getElementById('add-modal').classList.replace('hidden', 'flex'); }
        function closeModal() { document.getElementById('add-modal').classList.replace('flex', 'hidden'); }

        // دالة ذكية لاستخراج ID الفيديو بشكل صحيح للهواتف
        function extractID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function addVideo() {
            const title = document.getElementById('v-title').value;
            const id = extractID(document.getElementById('v-url').value);

            if (!title || !id) return alert("الرجاء التأكد من الرابط!");

            db.unshift({ id: Date.now(), title, videoId: id });
            localStorage.setItem('gh_mobile_vids', JSON.stringify(db));
            render();
            closeModal();
            document.getElementById('v-title').value = '';
            document.getElementById('v-url').value = '';
        }

        function render() {
            const feed = document.getElementById('video-feed');
            if (db.length === 0) {
                feed.innerHTML = '<div class="text-center py-20 opacity-20"><p>أضف أول فيديو لمشاهدته هنا</p></div>';
                return;
            }

            feed.innerHTML = db.map(v => `
                <div class="video-item animate-in fade-in duration-700">
                    <div class="video-wrapper">
                        <iframe 
                            src="https://www.youtube.com/embed/${v.videoId}?modestbranding=1&rel=0&playsinline=1&enablejsapi=1&origin=${window.location.origin}" 
                            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                            allowfullscreen>
                        </iframe>
                    </div>
                    <div class="mt-4 flex justify-between items-start px-2">
                        <h2 class="text-lg font-bold flex-1 leading-tight">${v.title}</h2>
                        <button onclick="deleteVid(${v.id})" class="text-gray-700 p-2"><i class="fas fa-trash-alt text-xs"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function deleteVid(id) {
            if(confirm('حذف الفيديو؟')) {
                db = db.filter(v => v.id !== id);
                localStorage.setItem('gh_mobile_vids', JSON.stringify(db));
                render();
            }
        }

        render();
    </script>
</body>
</html>
