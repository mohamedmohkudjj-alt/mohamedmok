<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTube Social | الملف الشخصي والتعليقات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f0f0f; color: white; font-family: system-ui, sans-serif; }
        .video-card iframe { border-radius: 20px; width: 100%; aspect-ratio: 16/9; border: 1px solid #272727; }
        .glass-nav { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(15px); border-bottom: 1px solid #272727; }
        .comment-item { background: #1a1a1a; border-radius: 15px; padding: 12px; border: 1px solid #333; margin-bottom: 10px; }
        .avatar { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; background: #333; }
        #profile-overlay { background: rgba(0,0,0,0.9); z-index: 100; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>

    <div id="profile-overlay" class="fixed inset-0 hidden flex items-center justify-center p-6">
        <div class="bg-[#1a1a1a] w-full max-w-md p-8 rounded-[2.5rem] border border-gray-800 text-center">
            <h2 class="text-2xl font-bold mb-6">مرحباً بك! اختر هويتك</h2>
            <div class="flex justify-center mb-6">
                <img id="preview-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" class="w-24 h-24 rounded-full border-4 border-red-600 p-1">
            </div>
            <input id="user-name-input" type="text" placeholder="اكتب اسمك هنا..." class="w-full bg-black border border-gray-800 p-4 rounded-2xl mb-4 text-center outline-none focus:border-red-600 transition">
            <button onclick="saveProfile()" class="w-full bg-red-600 py-4 rounded-2xl font-bold hover:bg-red-700 transition">دخول المنصة</button>
        </div>
    </div>

    <header class="glass-nav sticky top-0 z-50 p-4">
        <div class="max-w-6xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2 cursor-pointer" onclick="location.reload()">
                <i class="fab fa-youtube text-red-600 text-3xl"></i>
                <span class="font-bold text-xl tracking-tighter">MY<span class="text-red-600">TUBE</span></span>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="openModal()" class="hidden md:block bg-[#272727] px-4 py-2 rounded-full text-xs font-bold hover:bg-gray-700">نشر فيديو</button>
                <div id="user-tag" class="flex items-center gap-2 bg-gray-900 px-3 py-1.5 rounded-full border border-gray-800">
                    <span id="display-name" class="text-xs font-bold">زائر</span>
                    <img id="display-avatar" src="" class="w-6 h-6 rounded-full">
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-6">
        <div id="video-grid" class="space-y-16">
            </div>
    </main>

    <div id="video-modal" class="fixed inset-0 bg-black/95 hidden z-[60] items-center justify-center p-4">
        <div class="bg-[#1a1a1a] w-full max-w-md p-8 rounded-[2.5rem] border border-gray-800">
            <h2 class="text-xl font-bold mb-6">إضافة محتوى جديد</h2>
            <input id="video-title" type="text" placeholder="عنوان الفيديو" class="w-full bg-black border border-gray-800 p-4 rounded-2xl mb-4 outline-none">
            <input id="video-url" type="text" placeholder="رابط يوتيوب" class="w-full bg-black border border-gray-800 p-4 rounded-2xl mb-6 outline-none">
            <div class="flex gap-3">
                <button onclick="addVideo()" class="flex-1 bg-red-600 py-4 rounded-2xl font-bold">نشر</button>
                <button onclick="closeModal()" class="flex-1 bg-gray-800 py-4 rounded-2xl font-bold">إلغاء</button>
            </div>
        </div>
    </div>

    <script>
        let videos = JSON.parse(localStorage.getItem('yt_social_db')) || [];
        let currentUser = JSON.parse(localStorage.getItem('yt_user_profile'));

        // فحص وجود ملف شخصي
        window.onload = () => {
            if (!currentUser) {
                document.getElementById('profile-overlay').classList.remove('hidden');
            } else {
                updateUI();
                renderVideos();
            }
        };

        function saveProfile() {
            const name = document.getElementById('user-name-input').value.trim();
            if (!name) return alert("الرجاء إدخال اسمك");
            
            currentUser = {
                name: name,
                avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}`
            };
            
            localStorage.setItem('yt_user_profile', JSON.stringify(currentUser));
            document.getElementById('profile-overlay').classList.add('hidden');
            updateUI();
            renderVideos();
        }

        function updateUI() {
            document.getElementById('display-name').innerText = currentUser.name;
            document.getElementById('display-avatar').src = currentUser.avatar;
        }

        function openModal() { document.getElementById('video-modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('video-modal').classList.add('hidden'); }

        function getYouTubeID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function addVideo() {
            const title = document.getElementById('video-title').value;
            const videoId = getYouTubeID(document.getElementById('video-url').value);
            if (!title || !videoId) return alert("خطأ في البيانات");

            videos.unshift({ id: Date.now().toString(), title, videoId, comments: [] });
            localStorage.setItem('yt_social_db', JSON.stringify(videos));
            renderVideos();
            closeModal();
        }

        function addComment(vidId) {
            const input = document.getElementById(`input-${vidId}`);
            if (!input.value.trim()) return;

            const video = videos.find(v => v.id === vidId);
            video.comments.push({
                userName: currentUser.name,
                userAvatar: currentUser.avatar,
                text: input.value,
                time: "الآن"
            });

            localStorage.setItem('yt_social_db', JSON.stringify(videos));
            input.value = '';
            renderVideos();
        }

        function renderVideos() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = videos.map(v => `
                <div class="video-item">
                    <iframe src="https://www.youtube.com/embed/${v.videoId}" frameborder="0" allowfullscreen></iframe>
                    <h2 class="text-xl font-bold mt-4 px-2">${v.title}</h2>
                    
                    <div class="mt-6 px-2">
                        <p class="text-sm font-bold text-gray-500 mb-4">التعليقات (${v.comments.length})</p>
                        <div class="space-y-4 mb-6">
                            ${v.comments.map(c => `
                                <div class="flex gap-3 items-start">
                                    <img src="${c.userAvatar}" class="avatar">
                                    <div class="bg-[#1a1a1a] p-3 rounded-2xl flex-1 border border-gray-800">
                                        <div class="flex justify-between items-center mb-1">
                                            <span class="text-[11px] font-black text-red-500">${c.userName}</span>
                                            <span class="text-[9px] text-gray-600">${c.time}</span>
                                        </div>
                                        <p class="text-sm text-gray-300">${c.text}</p>
                                    </div>
                                </div>
                            `).join('')}
                        </div>

                        <div class="flex gap-3 mt-4 items-center bg-black p-2 rounded-full border border-gray-800">
                            <img src="${currentUser.avatar}" class="w-8 h-8 rounded-full">
                            <input id="input-${v.id}" type="text" placeholder="إضافة تعليق علني..." class="flex-1 bg-transparent border-none outline-none text-sm">
                            <button onclick="addComment('${v.id}')" class="text-red-600 px-4"><i class="fas fa-paper-plane"></i></button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
